services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kinntai-php
    volumes:
      - ./:/var/www
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: kinntai-nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mysql:
    image: mysql:8.4
    container_name: kinntai-mysql
    environment:
      MYSQL_DATABASE: attendance
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Tokyo
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  mailpit:
    image: axllent/mailpit:latest
    container_name: kinntai-mailpit
    ports:
      - "8026:8025"

volumes:
  mysql-data:
