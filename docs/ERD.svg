<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 16px Arial, sans-serif; fill: #ffffff; }
      .text { font: 14px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .label { font: 13px Arial, sans-serif; fill: #1f2937; }
      .box { fill: #ffffff; stroke: #111827; stroke-width: 2; rx: 8; }
      .head { fill: #111827; rx: 8; }
      .line { stroke: #4b5563; stroke-width: 2.5; fill: none; }
      .fk { fill: #fff7ed; }
      .pk { fill: #eff6ff; }
      .note { font: 700 20px Arial, sans-serif; fill: #111827; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4b5563"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="#f3f4f6"/>
  <text x="60" y="55" class="note">ER Diagram</text>

  <!-- users -->
  <rect x="70" y="110" width="430" height="290" class="box"/>
  <rect x="70" y="110" width="430" height="48" class="head"/>
  <text x="90" y="141" class="title">users</text>
  <line x1="70" y1="158" x2="500" y2="158" class="line"/>
  <text x="90" y="192" class="text">PK  id : bigint</text>
  <text x="90" y="224" class="text">name : string</text>
  <text x="90" y="256" class="text">UK  email : string</text>
  <text x="90" y="288" class="text">email_verified_at : timestamp</text>
  <text x="90" y="320" class="text">password : string</text>
  <text x="90" y="352" class="text">is_admin : boolean</text>
  <text x="90" y="384" class="text">remember_token : string</text>

  <!-- attendances -->
  <rect x="600" y="110" width="470" height="320" class="box"/>
  <rect x="600" y="110" width="470" height="48" class="head"/>
  <text x="620" y="141" class="title">attendances</text>
  <line x1="600" y1="158" x2="1070" y2="158" class="line"/>
  <text x="620" y="192" class="text">PK  id : bigint</text>
  <text x="620" y="224" class="text">FK  user_id : bigint</text>
  <text x="620" y="256" class="text">work_date : date</text>
  <text x="620" y="288" class="text">clock_in_at : timestamp</text>
  <text x="620" y="320" class="text">clock_out_at : timestamp</text>
  <text x="620" y="352" class="text">note : text</text>
  <text x="620" y="384" class="small">UNIQUE(user_id, work_date)</text>

  <!-- break_times -->
  <rect x="1120" y="560" width="390" height="240" class="box"/>
  <rect x="1120" y="560" width="390" height="48" class="head"/>
  <text x="1140" y="591" class="title">break_times</text>
  <line x1="1120" y1="608" x2="1510" y2="608" class="line"/>
  <text x="1140" y="642" class="text">PK  id : bigint</text>
  <text x="1140" y="674" class="text">FK  attendance_id : bigint</text>
  <text x="1140" y="706" class="text">started_at : timestamp</text>
  <text x="1140" y="738" class="text">ended_at : timestamp</text>

  <!-- stamp_correction_requests -->
  <rect x="70" y="540" width="690" height="340" class="box"/>
  <rect x="70" y="540" width="690" height="48" class="head"/>
  <text x="90" y="571" class="title">stamp_correction_requests</text>
  <line x1="70" y1="588" x2="760" y2="588" class="line"/>
  <text x="90" y="622" class="text">PK  id : bigint</text>
  <text x="90" y="654" class="text">FK  attendance_id : bigint</text>
  <text x="90" y="686" class="text">FK  user_id : bigint</text>
  <text x="90" y="718" class="text">requested_clock_in_at : timestamp</text>
  <text x="90" y="750" class="text">requested_clock_out_at : timestamp</text>
  <text x="90" y="782" class="text">requested_break_times : json</text>
  <text x="90" y="814" class="text">note : text</text>
  <text x="390" y="622" class="text">status : string</text>
  <text x="390" y="654" class="text">requested_at : timestamp</text>
  <text x="390" y="686" class="text">approved_at : timestamp</text>
  <text x="390" y="718" class="text">FK  approved_by : bigint</text>
  <text x="390" y="750" class="text">created_at : timestamp</text>
  <text x="390" y="782" class="text">updated_at : timestamp</text>

  <!-- Relations -->
  <path d="M 500 220 L 550 220 L 550 224 L 600 224" class="line" marker-end="url(#arrow)"/>
  <text x="525" y="208" class="label">user_id</text>

  <path d="M 835 430 L 835 500 L 1240 500 L 1240 560" class="line" marker-end="url(#arrow)"/>
  <text x="1000" y="488" class="label">attendance_id</text>

  <path d="M 730 540 L 835 540 L 835 430" class="line" marker-end="url(#arrow)"/>
  <text x="750" y="528" class="label">attendance_id</text>

  <path d="M 285 400 L 285 470 L 285 540" class="line" marker-end="url(#arrow)"/>
  <text x="300" y="474" class="label">user_id</text>

  <path d="M 220 400 L 220 910 L 520 910 L 520 880" class="line" marker-end="url(#arrow)"/>
  <text x="240" y="900" class="label">approved_by</text>
</svg>
